name: Temazo
options:
  bundleIdPrefix: es.temazo
  deploymentTarget:
    iOS: '17.0'
  createIntermediateGroups: true
  generateEmptyDirectories: false
  xcodeVersion: '16.0'

settings:
  base:
    SWIFT_VERSION: '5.10'
    DEVELOPMENT_TEAM: 4B8U4JJQ93
    MARKETING_VERSION: '2.11'
    CURRENT_PROJECT_VERSION: '51'
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: '-Onone'
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: '-O'

targets:
  Temazo:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: Temazo
    resources:
      - path: Temazo/Resources
    # Info.plist se mantiene manual en Temazo/Info.plist (no autogenerado por XcodeGen)
    # — así garantizamos que UIBackgroundModes audio está siempre presente.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.temazo.app
        PRODUCT_NAME: Temazo
        TARGETED_DEVICE_FAMILY: '1'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        INFOPLIST_FILE: Temazo/Info.plist
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: Temazo App Store Distribution
          DEVELOPMENT_TEAM: 4B8U4JJQ93
        Debug:
          CODE_SIGN_STYLE: Automatic
