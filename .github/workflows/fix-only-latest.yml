name: Fix - solo el build mas reciente en el grupo

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
      ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
    steps:
      - name: Save p8
        env:
          APPSTORE_API_KEY_P8: ${{ secrets.APPSTORE_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          printf '%s\n' "$APPSTORE_API_KEY_P8" | sed 's/[[:space:]]*$//' > ~/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${KEY_ID}.p8

      - name: Remove old builds from group, keep only newest
        run: |
          python3 -m pip install --quiet pyjwt cryptography requests
          python3 <<'PYEOF'
          import jwt, time, requests, json, os
          key_id = os.environ['KEY_ID']
          issuer_id = os.environ['ISSUER_ID']
          with open(f"/home/runner/private_keys/AuthKey_{key_id}.p8","rb") as f:
              key = f.read()
          payload = {"iss": issuer_id, "iat": int(time.time()),
                     "exp": int(time.time()) + 600, "aud": "appstoreconnect-v1"}
          token = jwt.encode(payload, key, algorithm="ES256",
                             headers={"kid": key_id, "typ": "JWT"})
          H = {"Authorization": f"Bearer {token}",
               "Content-Type": "application/json"}
          BASE = "https://api.appstoreconnect.apple.com/v1"

          r = requests.get(f"{BASE}/apps", headers=H,
                           params={"filter[bundleId]": "es.temazo.app.beta"})
          app_id = r.json()["data"][0]["id"]

          r = requests.get(f"{BASE}/apps/{app_id}/betaGroups", headers=H)
          gid = r.json()["data"][0]["id"]
          gname = r.json()["data"][0]["attributes"]["name"]
          print(f"Grupo: {gname} id={gid}")

          # Todos los builds ordenados por uploadedDate desc — usar /v1/builds
          r = requests.get(f"{BASE}/builds", headers=H,
                           params={"filter[app]": app_id, "limit": 20,
                                   "sort": "-uploadedDate"})
          builds = r.json().get("data", [])
          if not builds:
              print(f"NO BUILDS returned! Status={r.status_code}")
              print(r.text[:500])
              import sys; sys.exit(1)
          newest = builds[0]
          old = builds[1:]
          print(f"Newest: {newest['attributes']['version']}  (mantener)")
          print(f"Older ({len(old)}): {[b['attributes']['version'] for b in old]}")

          # DELETE relación grupo→build para cada older
          for b in old:
              bid = b["id"]
              ver = b["attributes"]["version"]
              body = {"data": [{"type": "betaGroups", "id": gid}]}
              r2 = requests.delete(f"{BASE}/builds/{bid}/relationships/betaGroups",
                                   headers=H, json=body)
              print(f"  Remove {ver} from group: HTTP {r2.status_code}")

          # Reasignar el nuevo (por si acaso)
          bid = newest["id"]
          body = {"data": [{"type": "betaGroups", "id": gid}]}
          r2 = requests.post(f"{BASE}/builds/{bid}/relationships/betaGroups",
                             headers=H, json=body)
          print(f"  Re-add {newest['attributes']['version']}: HTTP {r2.status_code}")

          # Verificar
          r = requests.get(f"{BASE}/betaGroups/{gid}/builds", headers=H)
          gbs = r.json().get("data", [])
          print(f"\nBuilds en grupo tras cleanup ({len(gbs)}):")
          for b in gbs:
              print(f"  {b['attributes']['version']}")
          PYEOF
