name: Build iOS (signed → TestFlight)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      upload_testflight:
        description: 'Upload to TestFlight after build (true/false)'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      BUNDLE_ID: es.temazo.app
      SCHEME: Temazo
      TEAM_ID: ${{ secrets.APP_STORE_TEAM_ID }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Preferimos la última 16.x disponible en el runner
          for V in 16.4 16.3 16.2 16.1 16.0; do
            if [ -d "/Applications/Xcode_${V}.app" ]; then
              sudo xcode-select -switch "/Applications/Xcode_${V}.app/Contents/Developer"
              echo "Selected Xcode ${V}"
              exit 0
            fi
          done
          sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          echo "Fallback Xcode default"

      - name: Show tools
        run: |
          xcodebuild -version
          swift --version
          which xcodegen || true

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate placeholder AppIcon (1024x1024)
        run: |
          ICON=Temazo/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png
          mkdir -p "$(dirname "$ICON")"
          if [ ! -f "$ICON" ]; then
            # Pink solid 1024x1024 — Apple solo exige tamaño + sin transparencia
            command -v magick >/dev/null 2>&1 || brew install imagemagick
            if command -v magick >/dev/null 2>&1; then
              magick -size 1024x1024 xc:'#FF2E93' "$ICON"
            else
              convert -size 1024x1024 xc:'#FF2E93' "$ICON"
            fi
          fi
          ls -lh "$ICON"

      - name: Generate silent.m4a (background audio keepalive)
        run: |
          OUT=Temazo/Resources/silent.m4a
          if [ ! -f "$OUT" ]; then
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=mono -t 1 -c:a aac -b:a 32k "$OUT" -y >/dev/null 2>&1 || true
            if [ ! -f "$OUT" ]; then
              brew install ffmpeg
              ffmpeg -f lavfi -i anullsrc=r=44100:cl=mono -t 1 -c:a aac -b:a 32k "$OUT" -y
            fi
          fi
          ls -lh "$OUT"

      - name: Generate Xcode project (XcodeGen)
        run: |
          xcodegen generate
          ls -la Temazo.xcodeproj

      - name: Import Distribution certificate (.p12) to keychain
        env:
          DIST_P12_BASE64: ${{ secrets.DIST_P12_BASE64 }}
          DIST_P12_PASSWORD: ${{ secrets.DIST_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Crear keychain temporal sólo para este build
          KEYCHAIN_PATH=$RUNNER_TEMP/temazo-build.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decodificar y importar el .p12
          P12_PATH=$RUNNER_TEMP/temazo_dist.p12
          echo "$DIST_P12_BASE64" | base64 -d > "$P12_PATH"
          security import "$P12_PATH" -P "$DIST_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Añadir el keychain a la lista de búsqueda
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          # Verificar
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Exportar PATH para steps siguientes
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Save App Store Connect API key
        env:
          APPSTORE_API_KEY_P8: ${{ secrets.APPSTORE_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          # printf preserva newlines del secreto. Aseguramos terminator final.
          printf '%s\n' "$APPSTORE_API_KEY_P8" | sed 's/[[:space:]]*$//' > ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          echo "--- p8 head/tail ---"
          head -1 ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          tail -1 ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          echo "--- openssl validate ---"
          openssl ec -in ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 -noout -check 2>&1 || true

      - name: Smoke-test API key (JWT → /v1/apps)
        env:
          KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          # Build header + payload + signature manually for ES256
          P8=~/private_keys/AuthKey_${KEY_ID}.p8
          NOW=$(date +%s)
          EXP=$(( NOW + 600 ))
          HEADER='{"alg":"ES256","kid":"'$KEY_ID'","typ":"JWT"}'
          PAYLOAD='{"iss":"'$ISSUER_ID'","iat":'$NOW',"exp":'$EXP',"aud":"appstoreconnect-v1"}'
          b64() { openssl base64 -e -A | tr '/+' '_-' | tr -d '='; }
          H=$(printf '%s' "$HEADER" | b64)
          P=$(printf '%s' "$PAYLOAD" | b64)
          SIG=$(printf '%s' "$H.$P" | openssl dgst -sha256 -binary -sign "$P8" | openssl asn1parse -inform DER 2>/dev/null | tail -2 | head -1 | awk -F: '{print $4}')
          # Above asn1parse approach is fragile — better use python (preinstalled on macOS) for proper ECDSA P1363 signature
          python3 - <<PYEOF
          import base64, json, time, sys, subprocess, hashlib
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import ec
          from cryptography.hazmat.primitives.asymmetric.utils import decode_dss_signature
          import urllib.request

          key_id = "$KEY_ID"
          issuer_id = "$ISSUER_ID"
          with open("$P8","rb") as f:
              key = serialization.load_pem_private_key(f.read(), password=None)
          header = {"alg":"ES256","kid":key_id,"typ":"JWT"}
          now = int(time.time())
          payload = {"iss":issuer_id,"iat":now,"exp":now+600,"aud":"appstoreconnect-v1"}
          def b64(b): return base64.urlsafe_b64encode(b).rstrip(b"=").decode()
          msg = (b64(json.dumps(header,separators=(',',':')).encode()) + "." +
                 b64(json.dumps(payload,separators=(',',':')).encode())).encode()
          sig_der = key.sign(msg, ec.ECDSA(hashes.SHA256()))
          r,s = decode_dss_signature(sig_der)
          sig = r.to_bytes(32,'big') + s.to_bytes(32,'big')
          jwt = msg.decode() + "." + b64(sig)
          req = urllib.request.Request("https://api.appstoreconnect.apple.com/v1/apps?limit=1",
                                       headers={"Authorization": "Bearer " + jwt})
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print("✓ API key OK, HTTP", r.status)
                  print(r.read()[:300])
          except urllib.error.HTTPError as e:
              print("✗ API key FAILED HTTP", e.code, e.read()[:500].decode("utf-8","replace"))
              sys.exit(1)
          except Exception as e:
              print("✗ Other error:", e)
              sys.exit(1)
          PYEOF

      - name: Set build number from timestamp
        id: version
        run: |
          BN=$(date +%y%m%d%H%M)
          echo "BUILD_NUMBER=$BN" >> $GITHUB_ENV
          echo "build_number=$BN" >> $GITHUB_OUTPUT

      - name: Archive (signed, automatic)
        run: |
          xcodebuild \
            -project Temazo.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/Temazo.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
            -authenticationKeyID ${APP_STORE_CONNECT_API_KEY_ID} \
            -authenticationKeyIssuerID ${APP_STORE_CONNECT_API_ISSUER_ID} \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGN_STYLE=Automatic \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            archive

      - name: Export IPA
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>uploadSymbols</key><true/>
            <key>destination</key><string>export</string>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/Temazo.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$PWD/build/ipa" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
            -authenticationKeyID ${APP_STORE_CONNECT_API_KEY_ID} \
            -authenticationKeyIssuerID ${APP_STORE_CONNECT_API_ISSUER_ID}
          ls -lh build/ipa/

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Temazo-${{ steps.version.outputs.build_number }}
          path: build/ipa/*.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Upload to TestFlight
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.upload_testflight == 'true'
        run: |
          IPA=$(ls build/ipa/*.ipa | head -1)
          echo "Uploading $IPA to TestFlight..."
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "${APP_STORE_CONNECT_API_KEY_ID}" \
            --apiIssuer "${APP_STORE_CONNECT_API_ISSUER_ID}"

      - name: Cleanup temporary keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
