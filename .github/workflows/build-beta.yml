name: Build Temazo Beta (signed → TestFlight)

# Solo se dispara manualmente para no interferir con el build.yml estable
# ni gastar minutos de CI cuando se toca la app estable. Además evita
# consumir cuota diaria de uploads TestFlight (Apple ~25/día).
on:
  workflow_dispatch:
    inputs:
      upload_testflight:
        description: 'Upload to TestFlight after build (true/false)'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 60
    defaults:
      run:
        working-directory: beta
    env:
      BUNDLE_ID: es.temazo.app.beta
      SCHEME: TemazoBeta
      TEAM_ID: ${{ secrets.APP_STORE_TEAM_ID }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          for V in 26.4 26.3 26.2 26.1 26.0 16.4 16.3 16.2 16.1 16.0; do
            if [ -d "/Applications/Xcode_${V}.app" ]; then
              sudo xcode-select -switch "/Applications/Xcode_${V}.app/Contents/Developer"
              echo "Selected Xcode ${V}"
              xcodebuild -version
              exit 0
            fi
          done
          sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate AppIcon 1024
        run: |
          ICON=Temazo/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png
          FG=Temazo/Resources/ic_launcher_foreground.png
          mkdir -p "$(dirname "$ICON")"
          command -v magick >/dev/null 2>&1 || brew install imagemagick
          MAGICK=$(command -v magick || command -v convert)
          if [ -f "$FG" ]; then
            $MAGICK -size 1024x1024 xc:'#0A0B16' \
              \( "$FG" -resize 720x720 \) -gravity center -composite \
              -alpha off "$ICON"
          else
            $MAGICK -size 1024x1024 xc:'#FF2E93' "$ICON"
          fi
          ls -lh "$ICON"

      - name: Generate silent.m4a
        run: |
          OUT=Temazo/Resources/silent.m4a
          rm -f "$OUT"
          command -v ffmpeg >/dev/null 2>&1 || brew install ffmpeg
          ffmpeg -f lavfi -i "sine=frequency=1:sample_rate=44100:duration=30" \
            -af "volume=-60dB" -ac 2 -c:a aac -b:a 64k "$OUT" -y
          ls -lh "$OUT"

      - name: Generate Xcode project (XcodeGen)
        run: |
          xcodegen generate
          ls -la TemazoBeta.xcodeproj

      - name: Import Distribution certificate (.p12) to keychain
        env:
          DIST_P12_BASE64: ${{ secrets.DIST_P12_BASE64 }}
          DIST_P12_PASSWORD: ${{ secrets.DIST_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/temazo-beta-build.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          P12_PATH=$RUNNER_TEMP/temazo_dist.p12
          echo "$DIST_P12_BASE64" | base64 -d > "$P12_PATH"
          security import "$P12_PATH" -P "$DIST_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Install Beta Distribution provisioning profile
        env:
          BETA_DIST_PROFILE_BASE64: ${{ secrets.BETA_DIST_PROFILE_BASE64 }}
          BETA_DIST_PROFILE_UUID: ${{ secrets.BETA_DIST_PROFILE_UUID }}
        run: |
          PROFILE_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILE_DIR"
          PROFILE_PATH="$PROFILE_DIR/${BETA_DIST_PROFILE_UUID}.mobileprovision"
          echo "$BETA_DIST_PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"
          ls -la "$PROFILE_DIR"
          security cms -D -i "$PROFILE_PATH" 2>/dev/null | grep -E "<key>(Name|UUID|TeamIdentifier|ApplicationIdentifierPrefix)" -A1 || true

      - name: Save App Store Connect API key
        env:
          APPSTORE_API_KEY_P8: ${{ secrets.APPSTORE_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          printf '%s\n' "$APPSTORE_API_KEY_P8" | sed 's/[[:space:]]*$//' > ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

      - name: Set build number from timestamp
        id: version
        run: |
          BN=$(date +%y%m%d%H%M)
          echo "BUILD_NUMBER=$BN" >> $GITHUB_ENV
          echo "build_number=$BN" >> $GITHUB_OUTPUT

      - name: Archive (signed manual via project.yml)
        run: |
          xcodebuild \
            -project TemazoBeta.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/TemazoBeta.xcarchive" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      - name: Verify Info.plist (background audio + beta bundle)
        run: |
          APP_PATH=$(find build/TemazoBeta.xcarchive/Products/Applications -name "*.app" | head -1)
          PLIST="$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :UIBackgroundModes" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST"
          MODES=$(/usr/libexec/PlistBuddy -c "Print :UIBackgroundModes:0" "$PLIST" 2>/dev/null || echo "")
          [ "$MODES" = "audio" ] || { echo "UIBackgroundModes audio NO está"; exit 1; }
          BID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST")
          [ "$BID" = "es.temazo.app.beta" ] || { echo "Bundle ID incorrecto: $BID"; exit 1; }
          echo "Beta bundle + background audio OK"

      - name: Export IPA
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${{ secrets.BETA_DIST_PROFILE_NAME }}</string>
            </dict>
            <key>uploadSymbols</key><true/>
            <key>destination</key><string>export</string>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          EOF
          cat ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/TemazoBeta.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$PWD/build/ipa"
          ls -lh build/ipa/

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TemazoBeta-${{ steps.version.outputs.build_number }}
          path: beta/build/ipa/*.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Upload to TestFlight
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.upload_testflight == 'true'
        run: |
          IPA=$(ls build/ipa/*.ipa | head -1)
          echo "Uploading $IPA to TestFlight..."
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "${APP_STORE_CONNECT_API_KEY_ID}" \
            --apiIssuer "${APP_STORE_CONNECT_API_ISSUER_ID}"

      - name: Cleanup temporary keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
