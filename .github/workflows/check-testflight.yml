name: Check TestFlight Beta status

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
      ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
    steps:
      - name: Save p8
        env:
          APPSTORE_API_KEY_P8: ${{ secrets.APPSTORE_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          printf '%s\n' "$APPSTORE_API_KEY_P8" | sed 's/[[:space:]]*$//' > ~/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${KEY_ID}.p8

      - name: Deep diagnostic Temazo Beta
        run: |
          python3 -m pip install --quiet pyjwt cryptography requests
          python3 <<'PYEOF'
          import jwt, time, requests, json, os
          key_id = os.environ['KEY_ID']
          issuer_id = os.environ['ISSUER_ID']
          with open(f"/home/runner/private_keys/AuthKey_{key_id}.p8","rb") as f:
              key = f.read()
          payload = {"iss": issuer_id, "iat": int(time.time()),
                     "exp": int(time.time()) + 600, "aud": "appstoreconnect-v1"}
          token = jwt.encode(payload, key, algorithm="ES256",
                             headers={"kid": key_id, "typ": "JWT"})
          H = {"Authorization": f"Bearer {token}"}

          def show(url, title, params=None):
              print("\n" + "=" * 60)
              print(title)
              print("=" * 60)
              r = requests.get(url, headers=H, params=params)
              print(f"HTTP {r.status_code}")
              try:
                  d = r.json()
              except:
                  print(r.text[:400])
                  return None
              return d

          d = show("https://api.appstoreconnect.apple.com/v1/apps",
                   "1. App Temazo Beta",
                   {"filter[bundleId]": "es.temazo.app.beta"})
          import sys
          apps = d.get("data", [])
          if not apps:
              print("APP NO ENCONTRADA")
              sys.exit(0)
          app = apps[0]
          app_id = app["id"]
          print(json.dumps(app.get("attributes"), indent=2))

          d = show(f"https://api.appstoreconnect.apple.com/v1/apps/{app_id}/builds",
                   "2. Builds asociados a la app", {"limit": 20})
          for b in d.get("data", []):
              ba = b["attributes"]
              print(f"  Build {ba.get('version')} state={ba.get('processingState')} uploaded={ba.get('uploadedDate')} expired={ba.get('expired')}")
          if not d.get("data"): print("  (vacío)")

          d = show("https://api.appstoreconnect.apple.com/v1/builds",
                   "3. /v1/builds filtrado por app", {"filter[app]": app_id, "limit": 20, "sort": "-uploadedDate"})
          for b in d.get("data", []):
              ba = b["attributes"]
              print(f"  Build {ba.get('version')} state={ba.get('processingState')} uploaded={ba.get('uploadedDate')}")
          if not d.get("data"): print("  (vacío)")

          d = show(f"https://api.appstoreconnect.apple.com/v1/apps/{app_id}/preReleaseVersions",
                   "4. Pre-release versions")
          for v in d.get("data", []):
              print(f"  Version {v['attributes'].get('version')} platform={v['attributes'].get('platform')}")
          if not d.get("data"): print("  (vacío)")

          d = show(f"https://api.appstoreconnect.apple.com/v1/apps/{app_id}/appInfos",
                   "5. App Infos (categoría, age rating)")
          for info in d.get("data", []):
              print(json.dumps(info.get("attributes"), indent=2))

          d = show(f"https://api.appstoreconnect.apple.com/v1/apps/{app_id}/betaAppReviewDetail",
                   "6. Beta App Review Detail (info testers, contact email)")
          if d and d.get("data"):
              print(json.dumps(d["data"].get("attributes"), indent=2))
          else:
              print("  (vacío o falta)")

          d = show(f"https://api.appstoreconnect.apple.com/v1/apps/{app_id}/betaLicenseAgreement",
                   "7. Beta License Agreement")
          if d and d.get("data"):
              print(json.dumps(d["data"].get("attributes"), indent=2))
          else:
              print("  (vacío o falta)")
          PYEOF
