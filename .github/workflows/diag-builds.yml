name: Diag - detalles por build

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
      ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
    steps:
      - name: Save p8
        env:
          APPSTORE_API_KEY_P8: ${{ secrets.APPSTORE_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          printf '%s\n' "$APPSTORE_API_KEY_P8" | sed 's/[[:space:]]*$//' > ~/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${KEY_ID}.p8

      - name: Diag detalles
        run: |
          python3 -m pip install --quiet pyjwt cryptography requests
          python3 <<'PYEOF'
          import jwt, time, requests, json, os
          key_id = os.environ['KEY_ID']
          issuer_id = os.environ['ISSUER_ID']
          with open(f"/home/runner/private_keys/AuthKey_{key_id}.p8","rb") as f:
              key = f.read()
          payload = {"iss": issuer_id, "iat": int(time.time()),
                     "exp": int(time.time()) + 600, "aud": "appstoreconnect-v1"}
          token = jwt.encode(payload, key, algorithm="ES256",
                             headers={"kid": key_id, "typ": "JWT"})
          H = {"Authorization": f"Bearer {token}",
               "Content-Type": "application/json"}
          BASE = "https://api.appstoreconnect.apple.com/v1"

          r = requests.get(f"{BASE}/apps", headers=H,
                           params={"filter[bundleId]": "es.temazo.app.beta"})
          app_id = r.json()["data"][0]["id"]

          r = requests.get(f"{BASE}/apps/{app_id}/builds", headers=H,
                           params={"limit": 20, "sort": "-uploadedDate"})
          for b in r.json().get("data", []):
              bid = b["id"]
              ba = b["attributes"]
              print("=" * 60)
              print(f"Build {ba.get('version')}  id={bid}")
              print(f"  processingState:         {ba.get('processingState')}")
              print(f"  usesNonExemptEncryption: {ba.get('usesNonExemptEncryption')}")
              print(f"  iconAssetToken:          {'YES' if ba.get('iconAssetToken') else 'NO'}")
              print(f"  minOsVersion:            {ba.get('minOsVersion')}")
              print(f"  valid:                   {ba.get('valid')}")
              print(f"  expired:                 {ba.get('expired')}")
              print(f"  uploadedDate:            {ba.get('uploadedDate')}")
              print(f"  expirationDate:          {ba.get('expirationDate')}")

              # Beta groups asociados
              r2 = requests.get(f"{BASE}/builds/{bid}/betaGroups", headers=H)
              grs = r2.json().get("data", [])
              print(f"  Grupos beta: {[g['attributes'].get('name') for g in grs]}")

              # Beta Build Localizations (What to test)
              r3 = requests.get(f"{BASE}/builds/{bid}/betaBuildLocalizations", headers=H)
              locs = r3.json().get("data", [])
              for loc in locs:
                  la = loc["attributes"]
                  print(f"  BBL locale={la.get('locale')} whatsNew={la.get('whatsNew')!r}")
              if not locs: print("  BBL: NINGUNA (Apple no envía a testers sin whatsNew!)")

              # Individual Testers
              r4 = requests.get(f"{BASE}/builds/{bid}/individualTesters", headers=H)
              its = r4.json().get("data", [])
              if its: print(f"  Individual testers: {len(its)}")

          PYEOF
