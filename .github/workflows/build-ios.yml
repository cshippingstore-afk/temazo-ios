name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Detect project file (SPM-based Capacitor 8 vs Pods)
        id: detect
        working-directory: ios/App
        run: |
          if [ -f "App.xcworkspace/contents.xcworkspacedata" ] && [ -f "Podfile" ]; then
            echo "using_pods=true" >> $GITHUB_OUTPUT
            echo "Detected Podfile + workspace"
          else
            echo "using_pods=false" >> $GITHUB_OUTPUT
            echo "No Podfile — using SPM"
          fi
          ls -la

      - name: Pod install (if needed)
        if: steps.detect.outputs.using_pods == 'true'
        working-directory: ios/App
        run: pod install --repo-update

      - name: Build unsigned archive
        working-directory: ios/App
        run: |
          if [ "${{ steps.detect.outputs.using_pods }}" = "true" ]; then
            xcodebuild \
              -workspace App.xcworkspace \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -archivePath $PWD/build/App.xcarchive \
              archive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM=""
          else
            xcodebuild \
              -project App.xcodeproj \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -archivePath $PWD/build/App.xcarchive \
              archive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM=""
          fi

      - name: Package as IPA
        working-directory: ios/App
        run: |
          mkdir -p Payload
          cp -r build/App.xcarchive/Products/Applications/App.app Payload/
          zip -qr Temazo.ipa Payload
          rm -rf Payload
          ls -lh Temazo.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Temazo-ipa
          path: ios/App/Temazo.ipa
          retention-days: 30
